<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — FraudShield</title>
<link rel="stylesheet" href="style.css">
<style>
.forgot-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 5rem 1rem 2rem; }
.forgot-card { max-width: 460px; width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2.5rem; box-shadow: var(--shadow); }
.forgot-icon { width: 60px; height: 60px; background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; margin-bottom: 1.5rem; }
.forgot-card h2 { font-family: sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--heading); margin-bottom: 0.5rem; }
.forgot-card p { color: var(--text2); font-size: 0.9rem; line-height: 1.6; margin-bottom: 1.5rem; }
</style>
</head>
<body>
<div id="nav-placeholder"></div>
<div id="toast-container"></div>
<main>
<div class="forgot-page">
  <div class="forgot-card">
    <div class="forgot-icon">🔑</div>
    <h2>Forgot Password?</h2>
    <p>No problem. Enter your registered email address and we'll send you password reset instructions.</p>
    <div id="forgot-alert"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="forgot-email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doReset()">
    </div>
    <button class="btn btn-primary btn-full" onclick="doReset()" id="reset-btn">Send Reset Instructions</button>
    <div style="text-align:center;margin-top:1.25rem;">
      <a href="login.html" style="color:var(--text3);font-size:0.85rem;text-decoration:none;">← Back to Sign In</a>
    </div>
    <hr class="divider">
    <div class="alert alert-info" style="font-size:0.85rem;">
      ℹ <strong>Demo Note:</strong> This is a frontend simulation. No real email is sent. For demo credentials, return to the <a href="login.html" style="color:var(--primary);">login page</a>.
    </div>
  </div>
</div>
</main>
<script src="app.js"></script>
<script>
document.getElementById('nav-placeholder').innerHTML = renderNav('forgot.html');
function doReset() {
  const email = document.getElementById('forgot-email').value.trim();
  const alertEl = document.getElementById('forgot-alert');
  const btn = document.getElementById('reset-btn');
  if (!email) { alertEl.innerHTML = '<div class="alert alert-error">✕ Please enter your email address.</div>'; return; }
  btn.innerHTML = '<div class="spinner"></div> Sending...';
  btn.disabled = true;
  setTimeout(() => {
    alertEl.innerHTML = `<div class="alert alert-success">✓ Password reset instructions have been sent to <strong>${email}</strong>. Please check your inbox (and spam folder).</div>`;
    document.getElementById('forgot-email').value = '';
    btn.innerHTML = 'Send Reset Instructions';
    btn.disabled = false;
  }, 1200);
}
</script>
</body>
</html>
